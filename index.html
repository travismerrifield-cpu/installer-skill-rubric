<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetson Installer Skills Matrix</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px 60px;
      color: #111;
      background: #fff;
    }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    h2 { font-size: 1.2rem; background: #1f2937; color: #fff; padding: 8px 12px; margin-top: 40px; border-radius: 4px; }
    h3 { font-size: 1rem; color: #1e40af; background: #eff6ff; padding: 4px 10px; border-radius: 3px; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0 24px; font-size: 0.875rem; }
    th { background: #1f2937; color: #fff; padding: 8px 12px; text-align: left; }
    th:not(:first-child) { text-align: center; }
    td { border: 1px solid #d1d5db; padding: 7px 12px; vertical-align: top; }
    td:not(:first-child) { text-align: center; font-weight: 600; }
    tr:nth-child(even) td { background: #f9fafb; }
    td:nth-child(2) { color: #92400e; }
    td:nth-child(3) { color: #1d4ed8; }
    td:nth-child(4) { color: #065f46; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 32px 0; }
    p { line-height: 1.6; }
  </style>
</head>
<body>
  <div id="content">Loading...</div>
  <script>
    fetch("Installer_Skills_Matrix.md")
      .then(r => r.text())
      .then(text => {
        document.getElementById("content").innerHTML = marked.parse(text);
      });
  </script>
</body>
</html>
